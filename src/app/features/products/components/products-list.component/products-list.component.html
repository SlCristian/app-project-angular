<div class="container mt-4">


  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold text-secondary">Lista de Productos</h4>
  </div>


  <form [formGroup]="formData" (ngSubmit)="getfilterProduct()">
    <div class="row g-2 mb-4">
      <div class="col-md-10">
        <div class="position-relative">
          <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
          <input type="search" class="form-control ps-5 shadow-sm" placeholder="Buscar producto..."
            formControlName="product">
        </div>
      </div>

      <div class="col-md-2 d-grid">
        <button type="submit" class="btn btn-success shadow-sm"
        (click)="getfilterProduct()"
        >
          <i class="bi bi-search"></i> Buscar
        </button>
      </div>
    </div>
  </form>


  <button class="btn btn-success rounded-circle shadow-lg btn-add" (click)="newElement()">
    <i class="bi bi-plus-lg fs-4"></i>
  </button>

 
  <div class="row">
@for(dato of productItemPage; track dato.id){
  <div class="col-md-4 mb-4">
    <div class="card product-card h-100 shadow-sm">

      <div class="card-body d-flex flex-column">

        <h5 class="card-title text-success fw-bold">
          {{dato.product}}
        </h5>

        <p class="card-text text-muted mb-1">
          <strong>Precio:</strong> S/ {{dato.price}}
        </p>

        <p class="card-text text-muted mb-1">
          <strong>Stock:</strong> {{dato.stock}}
        </p>

        <p class="card-text text-muted">
          {{dato.active?"Producto Activo":"Producto no disponible"}}
        </p>

        <div class="mt-auto d-flex justify-content-between">
          <button class="btn btn-outline-primary btn-sm" (click)="modificar(dato)">
            <i class="bi bi-pencil"></i> Editar
          </button>

          <button class="btn btn-outline-danger btn-sm" (click)="eliminar(dato.id!)">
            <i class="bi bi-trash"></i> Eliminar
          </button>
        </div>

      </div>
    </div>
  </div>
}


  </div>






  <div class="row">
    <div class="col-xs-12 col-12">
      <div class="content-wrapper">



      </div>
      <pagination [totalItems]="products.length" (pageChanged)="pageChanged($event)" [itemsPerPage]="itemsPerPage">
      </pagination>
    </div>
  </div>
